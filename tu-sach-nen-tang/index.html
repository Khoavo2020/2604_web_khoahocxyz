				display: flex;

			.book-link {

				border-bottom: 0;
				color: var(--ink-300);

				gap: 0.35rem;

			.book-link:hover {

		<!-- Scripts -->
		<script src="../assets/js/jquery.min.js"></script>
		<script src="../assets/js/browser.min.js"></script>

		<script src="../assets/js/util.js"></script>
		<script src="../assets/js/main.js"></script>
			<script>
				document.addEventListener('DOMContentLoaded', () => {
					const manifestUrl = '../assets/ebooks/manifest.json';
					const contentEl = document.getElementById('library-content');
					const statsEl = document.getElementById('library-stats');
					const searchEl = document.getElementById('library-search');

					const normalize = (value) => value
						.toLowerCase()
						.normalize('NFD')
						.replace(/[\u0300-\u036f]/g, '');

					const toTitle = (filename) => filename
						.replace(/\.[^/.]+$/, '')
						.replace(/[_-]+/g, ' ')
						.replace(/\s+/g, ' ')
						.trim();

					const formatSize = (bytes) => {
						if (!Number.isFinite(bytes)) return '';
						const units = ['B', 'KB', 'MB', 'GB'];
						let size = bytes;
						let idx = 0;
						while (size >= 1024 && idx < units.length - 1) {
							size /= 1024;
							idx += 1;
						}
						return `${size.toFixed(size >= 10 || idx === 0 ? 0 : 1)} ${units[idx]}`;
					};

					const buildBookCard = (book, categoryId) => {
						const card = document.createElement('div');
						card.className = 'book-card';

						const title = document.createElement('p');
						title.className = 'book-title';
						title.textContent = book.title || toTitle(book.file);

						const meta = document.createElement('div');
						meta.className = 'book-meta';
						meta.innerHTML = `
							<span>${(book.ext || '').toUpperCase()}</span>
							<span>${formatSize(book.size)}</span>
						`;

						const link = document.createElement('a');
						link.className = 'book-link';
						link.href = `../assets/ebooks/${categoryId}/${encodeURIComponent(book.file)}`;
						link.innerHTML = '<i class="icon solid fa-download" aria-hidden="true"></i><span class="label">Tải eBook</span>';
						link.setAttribute('aria-label', 'Tải eBook');
						link.setAttribute('title', 'Tải eBook');
						link.setAttribute('download', '');

						card.appendChild(title);
						card.appendChild(meta);
						card.appendChild(link);

						return card;
					};

					const renderLibrary = (data, keyword = '') => {
						contentEl.innerHTML = '';
						const fragment = document.createDocumentFragment();
						const normalizedKeyword = normalize(keyword.trim());
						let visibleCount = 0;

						data.categories.forEach((category) => {
							const section = document.createElement('div');
							section.className = 'library-section';

							const header = document.createElement('h2');
							header.textContent = category.title;
							section.appendChild(header);

							const grid = document.createElement('div');
							grid.className = 'book-grid';

							const filteredItems = category.items.filter((item) => {
								if (!normalizedKeyword) return true;
								const label = normalize((item.title || toTitle(item.file)) + ' ' + item.file);
								return label.includes(normalizedKeyword);
							});

							filteredItems.forEach((item) => {
								grid.appendChild(buildBookCard(item, category.id));
							});

							if (filteredItems.length > 0) {
								section.appendChild(grid);
								fragment.appendChild(section);
								visibleCount += filteredItems.length;
							}
						});

						if (visibleCount === 0) {
							contentEl.innerHTML = '<p>Không tìm thấy eBook phù hợp.</p>';
						} else {
							contentEl.appendChild(fragment);
						}

						statsEl.textContent = `${visibleCount} eBook`;
					};

					fetch(manifestUrl)
						.then((res) => {
							if (!res.ok) throw new Error('Manifest not found');
							return res.json();
						})
						.then((data) => {
							renderLibrary(data);
							searchEl.addEventListener('input', (event) => {
								renderLibrary(data, event.target.value);
							});
						})
						.catch(() => {
							statsEl.textContent = 'Không thể tải danh sách eBook.';
							contentEl.innerHTML = '<p>Hãy chạy script build manifest và tải lại trang.</p>';
						});
				});
			</script>
