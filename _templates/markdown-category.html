<!DOCTYPE HTML>
<html>
	<head>
		<title>{{CATEGORY_TITLE}} - Khoahoc.xyz</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="description" content="{{CATEGORY_DESCRIPTION}}" />
		<link rel="stylesheet" href="{{ROOT_PREFIX}}assets/css/main.css" />
		<style>
			.cover-list {
				display: block;
				margin-bottom: 1.5em;
			}
			.cover-list article {
				margin: 0 0 1.35em 0;
				padding: 0 0 1em 0;
				position: relative;
				width: 100%;
			}
			.cover-list article::before {
				display: none !important;
			}
			.cover-list article::after {
				background: rgba(210, 215, 217, 0.75);
				bottom: 0;
				content: '';
				display: block;
				height: 1px;
				left: 0;
				position: absolute;
				width: 100%;
			}
			.cover-list article:last-child {
				margin-bottom: 0;
				padding-bottom: 0;
			}
			.cover-list article:last-child::after {
				display: none;
			}
			.cover-list article h3 {
				font-size: 1em;
				font-weight: 700;
				letter-spacing: -0.01em;
				line-height: 1.24;
				margin: 0 0 0.35em 0;
			}
			.cover-list article h3 a {
				border-bottom: 0;
			}
			.cover-list .cover-item-body {
				align-items: start;
				display: grid;
				gap: 0.75em;
				grid-template-columns: 9.75em minmax(0, 1fr);
			}
			.cover-list article .image {
				display: block;
				margin: 0;
				width: 100%;
			}
			.cover-list article .image img {
				aspect-ratio: 16 / 10;
				display: block;
				height: 100%;
				object-fit: cover;
				width: 100%;
			}
			.cover-list article p {
				color: #4f5b62;
				font-size: 0.85em;
				line-height: 1.6;
				margin: 0;
				max-width: 33ch;
			}
			#header .logo {
				max-width: 67ch;
			}
			@media screen and (max-width: 480px) {
				.cover-list article {
					margin-bottom: 1.2em;
					padding-bottom: 0.9em;
				}
				.cover-list article h3 {
					font-size: 0.854em;
				}
				.cover-list .cover-item-body {
					gap: 0.85em;
					grid-template-columns: 7.25em minmax(0, 1fr);
				}
				.cover-list article p {
					font-size: 0.7em;
					line-height: 1.5;
					max-width: none;
				}
			}
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<div id="main">
				<div class="inner">
					{{HEADER_BLOCK}}
					{{HEADER_SUBLINE_BLOCK}}

					<section>
						<div class="cover-list">
							{{CATEGORY_POSTS}}
						</div>
					</section>
				</div>
			</div>

			<div id="sidebar">
				<div class="inner">
					<section id="search" class="alt">
						<form method="post" action="#">
							<input type="text" name="query" id="query" placeholder="Search" />
						</form>
					</section>

					<nav id="menu">
						<header class="major">
							<h2>Menu</h2>
						</header>
						<ul>
							<li><a href="{{ROOT_PREFIX}}index.html">🏠 xyz</a></li>
							<li><a href="{{ROOT_PREFIX}}khoa-hoc-pho-thong/index.html">🔭 Khoa học</a></li>
							<li><a href="{{ROOT_PREFIX}}kinh-te-hoc/index.html">💰 Kinh tế học</a></li>
							<li><a href="{{ROOT_PREFIX}}tam-ly-hoc/index.html">🧠 Tâm lý học</a></li>
							<li><a href="{{ROOT_PREFIX}}triet-hoc/index.html">🏛 Triết học</a></li>
							<li><a href="{{ROOT_PREFIX}}tinh-hoa-nhan-loai/index.html">🧭 Tinh hoa - nhân loại</a></li>
							<li><a href="{{ROOT_PREFIX}}tu-sach-nen-tang/index.html">📚 Tủ sách - nền tảng</a></li>
							<li><a href="{{ROOT_PREFIX}}ung-dung-nang-suat/index.html">📱 Ứng dụng - năng suất</a></li>
						</ul>
					</nav>

					<footer id="footer">
						<p class="copyright">Copyright &copy; <a href="https://facebook.com/KhoaHoc.xyz">Khoahoc.xyz</a></p>
					</footer>
				</div>
			</div>
		</div>

		<script src="{{ROOT_PREFIX}}assets/js/jquery.min.js"></script>
		<script src="{{ROOT_PREFIX}}assets/js/browser.min.js"></script>
		<script src="{{ROOT_PREFIX}}assets/js/breakpoints.min.js"></script>
		<script src="{{ROOT_PREFIX}}assets/js/util.js"></script>
		<script src="{{ROOT_PREFIX}}assets/js/main.js"></script>
	</body>
</html>
